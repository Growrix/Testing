name: backend-platform-ci

on:
  push:
    paths:
      - "backend-platform/**"
      - ".github/workflows/backend-platform-ci.yml"
  pull_request:
    paths:
      - "backend-platform/**"
      - ".github/workflows/backend-platform-ci.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-platform
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

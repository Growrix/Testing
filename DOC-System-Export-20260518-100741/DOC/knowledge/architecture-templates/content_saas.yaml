template: content_saas
description: >
  Template for SaaS apps where editorial content (blog, marketing pages, docs)
  is a primary surface, alongside auth and optional payments.

best_for:
  - content_heavy_saas
  - publishing_platforms
  - documentation_sites_with_paid_tiers
  - marketing_first_saas_with_blog_and_landing_pages

frontend:
  framework: nextjs
  router: app_router
  language: typescript
  styling: tailwindcss
  ui_kit: shadcn_ui
  state_management: react_server_components_plus_zustand_for_client_state
  data_fetching: server_components_with_groq_against_sanity_cdn
  forms: react_hook_form_plus_zod
  required_routes:
    - /
    - /blog
    - /blog/[slug]
    - /pricing
    - /docs/[[...slug]]
    - /sign-in
    - /sign-up
    - /dashboard
    - /api/webhooks/sanity
    - /api/webhooks/clerk
    - /api/webhooks/stripe
    - /api/draft

backend:
  runtime: nextjs_route_handlers
  service_layer: src/server/services
  repository_layer: src/server/repositories
  validation: zod
  background_jobs: nextjs_route_handlers_invoked_by_external_scheduler_or_queue

integrations:
  cms: sanity
  auth: clerk
  payments: stripe
  emails: resend
  analytics: posthog
  database: postgres

deployment:
  platform: vercel
  database_host: managed_postgres
  studio_host: sanity_managed_or_vercel_subdomain
  env_management: vercel_environments
  ci_cd: vercel_git_integration_plus_github_actions_for_db_migrations

required_env_vars:
  - NEXT_PUBLIC_SANITY_PROJECT_ID
  - NEXT_PUBLIC_SANITY_DATASET
  - NEXT_PUBLIC_SANITY_API_VERSION
  - SANITY_API_READ_TOKEN
  - SANITY_REVALIDATE_SECRET
  - NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY
  - CLERK_SECRET_KEY
  - CLERK_WEBHOOK_SIGNING_SECRET
  - STRIPE_SECRET_KEY
  - STRIPE_PUBLISHABLE_KEY
  - STRIPE_WEBHOOK_SECRET
  - RESEND_API_KEY
  - RESEND_FROM_ADDRESS
  - NEXT_PUBLIC_POSTHOG_KEY
  - NEXT_PUBLIC_POSTHOG_HOST
  - DATABASE_URL
  - DIRECT_URL

folder_structure:
  - src/app/(marketing)/page.tsx
  - src/app/(marketing)/pricing/page.tsx
  - src/app/(marketing)/blog/page.tsx
  - src/app/(marketing)/blog/[slug]/page.tsx
  - src/app/(marketing)/docs/[[...slug]]/page.tsx
  - src/app/(auth)/sign-in/[[...sign-in]]/page.tsx
  - src/app/(auth)/sign-up/[[...sign-up]]/page.tsx
  - src/app/(app)/dashboard/page.tsx
  - src/app/api/webhooks/sanity/route.ts
  - src/app/api/webhooks/clerk/route.ts
  - src/app/api/webhooks/stripe/route.ts
  - src/app/api/draft/route.ts
  - src/sanity/client.ts
  - src/sanity/queries/posts.ts
  - src/sanity/queries/pages.ts
  - src/sanity/queries/docs.ts
  - studio/sanity.config.ts
  - studio/schemas/post.ts
  - studio/schemas/author.ts
  - studio/schemas/category.ts
  - studio/schemas/page.ts
  - studio/schemas/seo.ts
  - src/server/services/billing.ts
  - src/server/services/email.ts
  - src/server/repositories/users.ts
  - src/server/repositories/subscriptions.ts
  - src/server/db/client.ts
  - src/lib/clerk.ts
  - src/lib/stripe.ts
  - src/lib/resend.ts
  - src/lib/posthog.ts
  - prisma/schema.prisma
  - emails/welcome.tsx
  - middleware.ts

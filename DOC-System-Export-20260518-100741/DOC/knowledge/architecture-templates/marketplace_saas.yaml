template: marketplace_saas
description: >
  Template for two-sided marketplaces with sellers, buyers, listings, search,
  and per-listing checkout. Auth, payments, emails, analytics included.

best_for:
  - two_sided_marketplaces
  - service_marketplaces
  - digital_product_marketplaces

frontend:
  framework: nextjs
  router: app_router
  language: typescript
  styling: tailwindcss
  ui_kit: shadcn_ui
  state_management: react_server_components_plus_zustand_for_client_state
  data_fetching: server_components_plus_fetch_with_revalidate
  forms: react_hook_form_plus_zod
  required_routes:
    - /
    - /listings
    - /listings/[slug]
    - /sellers/[slug]
    - /search
    - /sign-in
    - /sign-up
    - /dashboard
    - /dashboard/listings
    - /dashboard/listings/new
    - /dashboard/sales
    - /dashboard/billing
    - /api/webhooks/stripe
    - /api/webhooks/clerk
    - /api/checkout/[listingId]
    - /api/listings

backend:
  runtime: nextjs_route_handlers
  service_layer: src/server/services
  repository_layer: src/server/repositories
  validation: zod
  background_jobs: nextjs_route_handlers_invoked_by_external_scheduler_or_queue

integrations:
  auth: clerk
  payments: stripe
  emails: resend
  analytics: posthog
  database: postgres
  cms: sanity

deployment:
  platform: vercel
  database_host: managed_postgres
  studio_host: sanity_managed_or_vercel_subdomain
  env_management: vercel_environments
  ci_cd: vercel_git_integration_plus_github_actions_for_db_migrations

required_env_vars:
  - NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY
  - CLERK_SECRET_KEY
  - CLERK_WEBHOOK_SIGNING_SECRET
  - STRIPE_SECRET_KEY
  - STRIPE_PUBLISHABLE_KEY
  - STRIPE_WEBHOOK_SECRET
  - RESEND_API_KEY
  - RESEND_FROM_ADDRESS
  - NEXT_PUBLIC_POSTHOG_KEY
  - NEXT_PUBLIC_POSTHOG_HOST
  - DATABASE_URL
  - DIRECT_URL
  - NEXT_PUBLIC_SANITY_PROJECT_ID
  - NEXT_PUBLIC_SANITY_DATASET
  - NEXT_PUBLIC_SANITY_API_VERSION
  - SANITY_API_READ_TOKEN
  - SANITY_REVALIDATE_SECRET

folder_structure:
  - src/app/(marketing)/page.tsx
  - src/app/(marketing)/listings/page.tsx
  - src/app/(marketing)/listings/[slug]/page.tsx
  - src/app/(marketing)/sellers/[slug]/page.tsx
  - src/app/(marketing)/search/page.tsx
  - src/app/(auth)/sign-in/[[...sign-in]]/page.tsx
  - src/app/(auth)/sign-up/[[...sign-up]]/page.tsx
  - src/app/(app)/dashboard/page.tsx
  - src/app/(app)/dashboard/listings/page.tsx
  - src/app/(app)/dashboard/listings/new/page.tsx
  - src/app/(app)/dashboard/sales/page.tsx
  - src/app/(app)/dashboard/billing/page.tsx
  - src/app/api/webhooks/stripe/route.ts
  - src/app/api/webhooks/clerk/route.ts
  - src/app/api/checkout/[listingId]/route.ts
  - src/app/api/listings/route.ts
  - src/server/services/listings.ts
  - src/server/services/billing.ts
  - src/server/services/email.ts
  - src/server/repositories/users.ts
  - src/server/repositories/listings.ts
  - src/server/repositories/orders.ts
  - src/server/repositories/subscriptions.ts
  - src/server/db/client.ts
  - src/lib/clerk.ts
  - src/lib/stripe.ts
  - src/lib/resend.ts
  - src/lib/posthog.ts
  - prisma/schema.prisma
  - emails/welcome.tsx
  - emails/order-receipt.tsx
  - emails/seller-payout.tsx
  - middleware.ts

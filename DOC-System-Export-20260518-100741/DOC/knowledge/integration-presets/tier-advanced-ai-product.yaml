preset: tier-advanced-ai-product
applies_to:
  archetype: ai_product
  tier_band: advanced
description: AI-first SaaS with LLM integration, RAG pipeline, vector store, streaming, cost tracking, and moderation.

integrations:
  hosting:        vercel
  dns:            cloudflare-dns
  auth:           clerk
  payments:       stripe
  tax:            stripe-tax
  database:       neon-postgres
  orm:            prisma
  file_storage:   uploadthing
  background_jobs: inngest
  cache:          upstash
  search:         meilisearch
  ai_llm:         openai
  ai_llm_alt:     anthropic
  vector_store:   turbopuffer
  ai_observability: helicone
  email_tx:       resend
  email_marketing: loops
  notifications:  knock
  analytics:      posthog
  error_tracking: sentry
  logging:        axiom
  status_page:    betterstack-status
  uptime:         betterstack-uptime
  spam_guard:     cloudflare-turnstile
  cookie_consent: cookiebot

forbidden: []

optional:
  - ai_llm_alt: anthropic
  - onboarding_tours: userflow
  - document_signing: documenso

required_skills:
  - streaming-llm-response-pattern
  - ai-cost-tracking-pattern
  - ai-moderation-precheck-pattern
  - retrieval-augmented-generation-pattern
  - rate-limit-with-upstash-pattern

automation_surface:
  outbound: enabled
  default_runner: n8n
  events_base:
    - user.created
    - subscription.created
    - subscription.canceled
    - ai.usage.limit_reached

support_stack_tier: advanced

support_tools:
  - betterstack-uptime
  - checkly
  - betterstack-status
  - simplebackups
  - snaplet
  - snyk
  - socket
  - gitguardian
  - cloudflare-waf
  - ahrefs
  - google-search-console
  - screaming-frog
  - pagerduty
  - crisp

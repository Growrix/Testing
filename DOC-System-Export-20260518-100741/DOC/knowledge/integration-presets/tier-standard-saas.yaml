preset: tier-standard-saas
applies_to:
  archetype: saas_app
  tier_band: standard
description: Full-stack SaaS app with auth, billing, database, background jobs, notifications, and basic AI assistant.

integrations:
  hosting:        vercel
  dns:            cloudflare-dns
  auth:           clerk
  payments:       stripe
  tax:            stripe-tax
  database:       neon-postgres
  orm:            prisma
  file_storage:   uploadthing
  background_jobs: inngest
  cache:          upstash
  search:         meilisearch
  email_tx:       resend
  email_marketing: loops
  notifications:  knock
  analytics:      posthog
  error_tracking: sentry
  logging:        axiom
  status_page:    betterstack-status
  uptime:         betterstack-uptime
  ai_llm:         openai
  spam_guard:     cloudflare-turnstile
  cookie_consent: cookiebot

optional:
  - sms: twilio          # activate when SMS notifications required
  - booking: calcom      # activate when scheduling feature required

forbidden:
  - workos        # advanced tier; only if brief explicitly requires B2B SSO
  - segment       # advanced tier
  - permit-io     # advanced tier

automation_surface:
  outbound: enabled
  default_runner: n8n
  events_base:
    - lead.created
    - user.created
    - subscription.created
    - subscription.canceled

support_stack_tier: standard

support_tools:
  - betterstack-uptime
  - betterstack-status
  - simplebackups
  - snyk
  - gitguardian
  - google-search-console
  - screaming-frog
  - better-stack-oncall
  - crisp

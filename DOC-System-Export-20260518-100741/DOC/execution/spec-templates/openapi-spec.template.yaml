openapi: "3.1.0"

info:
  title: "[App Name] API"
  version: "1.0.0"
  description: |
    Auto-generated OpenAPI spec from plan.json.
    Generated by: openapi_writer.agent.md
    Plan ID: [plan_id]
  contact:
    email: "[support@example.com]"
  license:
    name: "Proprietary"

servers:
  - url: "https://[domain]/api"
    description: "Production"
  - url: "https://staging.[domain]/api"
    description: "Staging"
  - url: "http://localhost:3000/api"
    description: "Local"

security:
  - ClerkSession: []

components:
  securitySchemes:
    ClerkSession:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "Clerk session token (from Authorization: Bearer header or __session cookie)"
    ApiKey:
      type: apiKey
      in: header
      name: X-API-Key
      description: "API key for external clients (API SaaS template only)"

  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              example: "VALIDATION_ERROR"
            message:
              type: string
              example: "Invalid input"
            fields:
              type: object
              additionalProperties:
                type: array
                items:
                  type: string

    PaginatedResponse:
      type: object
      properties:
        data:
          type: array
          items: {}
        nextCursor:
          type: string
          nullable: true
        total:
          type: integer

    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ok, degraded]
        dependencies:
          type: object
          properties:
            database:
              type: string
              enum: [ok, error]
            redis:
              type: string
              enum: [ok, error]

    # ─── Domain Schemas ────────────────────────────────────────────────
    # Add one schema per domain entity below.

    User:
      type: object
      required: [id, email, name, role, createdAt]
      properties:
        id:
          type: string
          format: cuid
        email:
          type: string
          format: email
        name:
          type: string
        avatarUrl:
          type: string
          format: uri
          nullable: true
        role:
          type: string
          enum: [ADMIN, MEMBER, VIEWER]
        createdAt:
          type: string
          format: date-time

    # [Add more schemas here matching your plan.db_schema tables]

paths:
  /health:
    get:
      summary: Health check
      operationId: getHealth
      security: []
      tags: [Health]
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "503":
          description: Service degraded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  # ─── Auth / Users ─────────────────────────────────────────────────
  /me:
    get:
      summary: Get current authenticated user
      operationId: getMe
      tags: [Users]
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/User"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ─── Add more paths here ───────────────────────────────────────────
  # Follow the pattern:
  #
  # /[resource]:
  #   get:
  #     summary: List [resources]
  #     operationId: list[Resources]
  #     tags: [[Tag]]
  #     parameters:
  #       - name: cursor
  #         in: query
  #         schema:
  #           type: string
  #       - name: limit
  #         in: query
  #         schema:
  #           type: integer
  #           maximum: 100
  #           default: 20
  #     responses:
  #       "200":
  #         content:
  #           application/json:
  #             schema:
  #               $ref: "#/components/schemas/PaginatedResponse"
  #
  # /[resource]/{id}:
  #   get:
  #     summary: Get [resource] by ID
  #     ...

  /webhooks/stripe:
    post:
      summary: Stripe webhook receiver
      operationId: stripeWebhook
      security: []
      tags: [Webhooks]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      parameters:
        - name: Stripe-Signature
          in: header
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Webhook processed
        "400":
          description: Invalid signature or payload

  /webhooks/clerk:
    post:
      summary: Clerk webhook receiver
      operationId: clerkWebhook
      security: []
      tags: [Webhooks]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      parameters:
        - name: svix-signature
          in: header
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Webhook processed
        "400":
          description: Invalid signature

tags:
  - name: Health
    description: Service health and status
  - name: Users
    description: User management
  - name: Webhooks
    description: Provider webhook receivers
  # Add more tags matching your features

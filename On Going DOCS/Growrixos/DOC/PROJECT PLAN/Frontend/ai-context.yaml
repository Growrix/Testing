version: 1
project:
  name: Agency Website Frontend Plan
  type: public marketing, services, commerce, and conversion website
  summary: >-
    Premium SaaS-style web presence for a web development agency with service
    detail pages, a digital product shop, portfolio proof, AI concierge,
    booking, WhatsApp escalation, and Stripe checkout planning.
  status: documentation-first
  canonical_docs_root: DOC/PROJECT PLAN/Frontend/
  canonical_ai_entrypoint: DOC/PROJECT PLAN/Frontend/ai-context.yaml
  canonical_human_index: DOC/PROJECT PLAN/Frontend/README.md

prompt_contract:
  always_reference_first:
    - DOC/PROJECT PLAN/Frontend/ai-context.yaml
  minimum_instruction: >-
    Start by reading DOC/PROJECT PLAN/Frontend/ai-context.yaml, then follow the listed
    read_path for the current frontend task before implementing pages,
    components, or flows.

core_invariants:
  - Use design tokens and shared primitives as the styling source of truth.
  - Avoid hardcoded design values outside the documented design system.
  - Keep public marketing, commerce, proof, and conversion flows structurally distinct but visually consistent.
  - Server-authoritative flows such as booking, checkout, chat handoff, and payment states must not be treated as client truth.
  - Explicitly handle loading, empty, error, offline or reconnect, and success states where relevant.
  - All UI must remain responsive, accessible, and localization-ready.
  - For scale and enhancement planning, audit and reuse existing shells, layouts, components, sections, and content collections before adding new frontend architecture.
  - Frontend planning must define which surfaces are code-authored versus CMS-authored and how Sanity models blog posts, services, shop content, case studies, FAQs, and landing content when those surfaces are in scope.
  - Shared site chrome must preserve a common footer copyright implementation: © {year} {Company Name or Site Name}. All right reserved. Built & Maintenece by Growrix OS. Link Growrix OS to https://www.growrixos.com.

scope_specific_planning_docs:
  cms_content_operations:
    canonical_doc: DOC/PROJECT PLAN/Frontend/cms-content-operations-frontend.md
    parent_artifact: DOC/PROJECT PLAN/cms-content-operations-e2e-plan.md
    use_for:
      - route-by-route content source ownership during CMS rollout
      - component reuse, fallback, and preview rules for portfolio, shop, services, FAQ, homepage, and about surfaces
  aircon_installer_transformation:
    canonical_doc: DOC/PROJECT PLAN/Frontend/aircon-installer-transformation-frontend.md
    parent_artifact: DOC/PROJECT PLAN/aircon-installer-transformation-e2e-plan.md
    use_for:
      - route-by-route transformation planning for the aircon installer site
      - keep adapt replace retire decisions and shared-surface reuse rules for the transformed frontend

surfaces:
  public_marketing:
    routes:
      - /
      - /blog
      - /blog/[slug]
      - /services
      - /services/saas-applications
      - /services/websites
      - /services/html-business-profiles
      - /services/mcp-servers
      - /services/automation
      - /additional-services
      - /portfolio
      - /portfolio/[slug]
      - /pricing
      - /about
      - /faq
    capabilities:
      - marketing
      - thought leadership
      - content discovery
      - service discovery
      - proof and credibility
  commerce:
    routes:
      - /shop
      - /shop/[slug]
      - /checkout
      - /html-business-profiles
    capabilities:
      - category browsing
      - product discovery
      - purchase flow
  conversion:
    routes:
      - /ai-concierge
      - /book-appointment
      - /contact
    capabilities:
      - AI assistance
      - live chat escalation
      - WhatsApp routing
      - appointment booking
  trust_and_utility:
    routes:
      - /privacy-policy
      - /terms-of-service
      - /404
    capabilities:
      - policy visibility
      - recovery and trust

foundation_docs:
  - DOC/PROJECT PLAN/Frontend/00-master-ui-architecture.md
  - DOC/PROJECT PLAN/Frontend/01-design-system.md
  - DOC/PROJECT PLAN/Frontend/02-component-system.md

frontend_rules:
  mandatory:
    - No hardcoded design values outside tokens and documented primitives.
    - Keep page composition thin and route workflow logic through reusable components and implementation modules.
    - Use explicit status handling for loading, empty, error, and recovery states.
    - Keep mobile interactions thumb-friendly and avoid hover-only access paths.
    - Preserve SEO structure for public pages and trust clarity for commerce flows.

